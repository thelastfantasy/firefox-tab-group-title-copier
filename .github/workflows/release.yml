name: Release

on:
  push:
    tags:
      - 'v*'
  # 允许从 GitHub Actions 页面手动触发，用于测试构建流程（不会实际发布）
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (skip GitHub Release and AMO submission)'
        required: false
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'
      version:
        description: 'Version label (e.g. v1.2.0), used for artifact naming in dry run'
        required: false
        default: 'dry-run'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    # 判断是否为 dry run 模式：手动触发且 dry_run=true
    env:
      IS_DRY_RUN: ${{ github.event_name == 'workflow_dispatch' && inputs.dry_run == 'true' }}
      VERSION: ${{ github.event_name == 'push' && github.ref_name || inputs.version }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Package XPI
        run: npx web-ext build --source-dir=dist --overwrite-dest --filename=tab_group_title_copier-${{ env.VERSION }}.xpi

      - name: Package source code for AMO review
        run: git archive --format=zip --output=firefox-tab-group-title-copier-source-${{ env.VERSION }}.zip HEAD

      - name: Upload artifacts (dry run)
        if: env.IS_DRY_RUN == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: release-artifacts-${{ env.VERSION }}
          path: |
            web-ext-artifacts/tab_group_title_copier-${{ env.VERSION }}.xpi
            firefox-tab-group-title-copier-source-${{ env.VERSION }}.zip
          retention-days: 3

      - name: Create GitHub Release
        if: env.IS_DRY_RUN == 'false'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            web-ext-artifacts/tab_group_title_copier-${{ env.VERSION }}.xpi
            firefox-tab-group-title-copier-source-${{ env.VERSION }}.zip
          generate_release_notes: true
          body: |
            ## Version ${{ env.VERSION }}

            Firefox extension for copying all tab titles from tab groups.

            ### Files
            - `tab_group_title_copier-${{ env.VERSION }}.xpi` - Firefox extension
            - `firefox-tab-group-title-copier-source-${{ env.VERSION }}.zip` - Source code (for AMO review)

            See [CHANGELOG.md](https://github.com/thelastfantasy/firefox-tab-group-title-copier/blob/main/CHANGELOG.md) for detailed changes.

      - name: Submit to AMO
        if: env.IS_DRY_RUN == 'false'
        run: |
          npx web-ext sign \
            --api-key=${{ secrets.AMO_API_KEY }} \
            --api-secret=${{ secrets.AMO_API_SECRET }} \
            --source-dir=dist \
            --channel=listed
